<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<title>Politie Nederbeek Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#061a2e;
color:white;
}

.sidebar{
position:fixed;
width:220px;
height:100%;
background:#02101c;
padding:20px;
}

.sidebar h2{
color:#ffc600;
}

.sidebar button{
width:100%;
margin-top:10px;
padding:10px;
background:#0c2d4a;
color:white;
border:none;
cursor:pointer;
}

.content{
margin-left:240px;
padding:30px;
}

.card{
background:#0e2b4a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.agent{
background:#081e33;
padding:10px;
margin-bottom:6px;
border-radius:6px;
}

.btn{
background:#ffc600;
border:none;
padding:10px;
cursor:pointer;
}

.nood{
background:red;
color:white;
padding:15px;
font-size:20px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Meldkamer</h2>

<button onclick="showTab('agents')">Agenten</button>

<button onclick="showTab('porto')">Porto kanalen</button>

<button onclick="showTab('agenda')">Agenda</button>

<button onclick="showTab('vta')">VTA</button>

<button onclick="logout()">Uitloggen</button>

</div>

<div class="content">

<div id="agents" class="card">

<h2>Actieve Agenten</h2>

<div id="agentList"></div>

</div>


<div id="porto" class="card" style="display:none">

<h2>Porto kanalen</h2>

<button class="btn" onclick="setPorto('porto1')">Porto 1</button>
<button class="btn" onclick="setPorto('porto2')">Porto 2</button>
<button class="btn" onclick="setPorto('recherche')">Recherche</button>
<button class="btn" onclick="setPorto('DSI')">DSI</button>

</div>


<div id="agenda" class="card" style="display:none">

<h2>Training agenda</h2>

<input id="titel" placeholder="Training">

<input type="date" id="datum">

<button onclick="addAgenda()">Toevoegen</button>

<div id="agendaList"></div>

</div>


<div id="vta" class="card" style="display:none">

<h2>VTA</h2>

<input id="vtaNaam" placeholder="Naam">

<input id="vtaKenteken" placeholder="Kenteken">

<button onclick="addVta()">Opslaan</button>

<div id="vtaList"></div>

</div>


<div class="card">

<button class="nood" onclick="sendNood()">🚨 NOODKNOP</button>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({
 apiKey:"YOURKEY",
 authDomain:"YOURPROJECT.firebaseapp.com",
 databaseURL:"YOURDATABASEURL"
});

const auth=firebase.auth();
const db=firebase.database();

let currentUser;

auth.onAuthStateChanged(user=>{

if(!user){

location="login.html";
return;

}

currentUser=user;

loadAgents();
loadAgenda();
loadVtas();

});

function logout(){

auth.signOut();

}

function showTab(tab){

["agents","porto","agenda","vta"].forEach(t=>{

document.getElementById(t).style.display="none"

});

document.getElementById(tab).style.display="block";

}

function loadAgents(){

db.ref("users").on("value",snap=>{

agentList.innerHTML="";

snap.forEach(child=>{

const u=child.val();

agentList.innerHTML+=`
<div class="agent">

${u.naam} (${u.roepnummer}) - ${u.rang}

</div>
`;

});

});

}

function setPorto(channel){

db.ref("users/"+currentUser.uid+"/porto").set(channel);

alert("Porto ingesteld op "+channel);

}

function addAgenda(){

const titel=document.getElementById("titel").value;

const datum=document.getElementById("datum").value;

db.ref("agenda").push({

titel:titel,
datum:datum

});

}

function loadAgenda(){

db.ref("agenda").on("value",snap=>{

agendaList.innerHTML="";

snap.forEach(child=>{

const a=child.val();

agendaList.innerHTML+=`

<div class="agent">

${a.titel} - ${a.datum}

</div>

`;

});

});

}

function addVta(){

db.ref("vtas").push({

naam:vtaNaam.value,
kenteken:vtaKenteken.value

});

}

function loadVtas(){

db.ref("vtas").on("value",snap=>{

vtaList.innerHTML="";

snap.forEach(child=>{

const v=child.val();

vtaList.innerHTML+=`

<div class="agent">

${v.naam} - ${v.kenteken}

</div>

`;

});

});

}

function sendNood(){

db.ref("nood").set({

actief:true,
tijd:Date.now()

});

}

</script>

</body>
</html>
