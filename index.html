<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Politie Meldkamer Nederbeek</title>

<style>

body{
margin:0;
font-family:Arial;
background:#071a2d;
color:white;
}

header{
background:#02101c;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#ffc600;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:#0e2b4a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#ffc600;
font-weight:bold;
cursor:pointer;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#031321;
padding:20px;
}

.sidebar button{
width:100%;
margin-top:10px;
background:#0e2b4a;
color:white;
}

.content{
margin-left:250px;
padding:30px;
}

.agent{
background:#081e33;
padding:10px;
margin-bottom:6px;
border-radius:6px;
}

.nood{
background:red;
color:white;
font-size:20px;
padding:16px;
width:100%;
}

.voice-channel{
background:#081e33;
padding:12px;
margin-top:8px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>
 <div id="loginPage" class="container">

<div class="card">

<h2>Agent Login</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Wachtwoord">

<button onclick="login()">Inloggen</button>

</div>

<div class="card">

<h2>Registreren</h2>

<input id="naam" placeholder="Naam">
<input id="roepnummer" placeholder="Roepnummer">

<select id="rang">

<option>Aspirant</option>
<option>Surveillant</option>
<option>Agent</option>
<option>Hoofdagent</option>
<option>Brigadier</option>
<option>Inspecteur</option>
<option>Hoofdinspecteur</option>
<option>Commissaris</option>
<option>Hoofdcommissaris</option>
<option>Eerste Hoofdcommissaris</option>

</select>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Wachtwoord">

<button onclick="register()">Registreren</button>

</div>

</div>
<div id="dashboard" style="display:none">

<div class="sidebar">

<h2>Meldkamer</h2>

<button onclick="openTab('units')">Eenheden</button>
<button onclick="openTab('porto')">Porto</button>
<button onclick="openTab('agenda')">Agenda</button>
<button onclick="openTab('vta')">VTA</button>
<button onclick="openTab('admin')">Admin</button>

<button onclick="logout()">Uitloggen</button>

</div>

<div class="content">

<div id="units" class="card">

<h2>Actieve Agenten</h2>

<div id="agentList"></div>

<button class="nood" onclick="sendNood()">🚨 NOODKNOP</button>

</div>
<div id="porto" class="card" style="display:none">

<h2>Porto Kanalen</h2>

<div class="voice-channel" onclick="joinVoice('porto1')">Porto 1</div>

<div class="voice-channel" onclick="joinVoice('porto2')">Porto 2</div>

<div class="voice-channel" onclick="joinVoice('recherche')">Recherche</div>

<div class="voice-channel" onclick="joinVoice('DSI')">DSI</div>

</div>
<div id="agenda" class="card" style="display:none">

<h2>Training Agenda</h2>

<input id="trainingTitel" placeholder="Training">
<input type="date" id="trainingDatum">

<button onclick="addTraining()">Toevoegen</button>

<div id="agendaList"></div>

</div>
<div id="vta" class="card" style="display:none">

<h2>VTA systeem</h2>

<input id="vtaNaam" placeholder="Naam">
<input id="vtaKenteken" placeholder="Kenteken">

<button onclick="addVta()">Opslaan</button>

<div id="vtaList"></div>

</div>
<div id="admin" class="card" style="display:none">

<h2>Admin Panel</h2>

<div id="adminUsers"></div>

</div>

</div>

</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

firebase.initializeApp({

apiKey:"JOUW_API",
authDomain:"PROJECT.firebaseapp.com",
databaseURL:"DATABASE_URL"

});

const auth=firebase.auth();
const db=firebase.database();

let currentUser;

auth.onAuthStateChanged(user=>{

if(user){

loginPage.style.display="none";
dashboard.style.display="block";

currentUser=user;

loadAgents();
loadAgenda();
loadVtas();

}

});

</script>
<script>

function register(){

auth.createUserWithEmailAndPassword(email.value,password.value)

.then(user=>{

db.ref("users/"+user.user.uid).set({

naam:naam.value,
roepnummer:roepnummer.value,
rang:rang.value,
porto:"porto1",
status:1

})

alert("Registratie voltooid")

})

}

function login(){

auth.signInWithEmailAndPassword(loginEmail.value,loginPass.value)

}

function logout(){

auth.signOut()

}

</script>
<script>

function openTab(tab){

["units","porto","agenda","vta","admin"].forEach(t=>{

document.getElementById(t).style.display="none"

})

document.getElementById(tab).style.display="block"

}

function loadAgents(){

db.ref("users").on("value",snap=>{

agentList.innerHTML=""

snap.forEach(child=>{

const u=child.val()

agentList.innerHTML+=`

<div class="agent">

${u.naam} (${u.roepnummer}) - ${u.rang}

</div>

`

})

})

}

function sendNood(){

db.ref("nood").set({

actief:true,
tijd:Date.now()

})

alert("NOODMELDING VERSTUURD")

}

</script>
<script>

function addTraining(){

db.ref("agenda").push({

titel:trainingTitel.value,
datum:trainingDatum.value

})

}

function loadAgenda(){

db.ref("agenda").on("value",snap=>{

agendaList.innerHTML=""

snap.forEach(child=>{

const a=child.val()

agendaList.innerHTML+=`

<div class="agent">

${a.titel} - ${a.datum}

</div>

`

})

})

}

function addVta(){

db.ref("vtas").push({

naam:vtaNaam.value,
kenteken:vtaKenteken.value

})

}

function loadVtas(){

db.ref("vtas").on("value",snap=>{

vtaList.innerHTML=""

snap.forEach(child=>{

const v=child.val()

vtaList.innerHTML+=`

<div class="agent">

${v.naam} - ${v.kenteken}

</div>

`

})

})

}

</script>
</body>
</html>
